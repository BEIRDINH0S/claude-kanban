name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (aarch64)
            label: macOS Apple Silicon
          - platform: windows-latest # x86_64
            label: Windows x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # `npm install` triggers postinstall which:
      #   - installs sidecar dependencies (sidecar/node_modules)
      #   - downloads the Node binary for the host arch into
      #     src-tauri/binaries/node-<target-triple>
      # Each platform job gets exactly the binary it needs to bundle.
      - name: Install JS dependencies
        run: npm install

      # Le tag git (`vX.Y.Z`) est la source de vérité pour la version.
      # Sans ce step, les bundles produits gardent le `0.1.0` hardcodé
      # dans tauri.conf.json / Cargo.toml / package.json — donc le DMG
      # s'appelle `claude-kanban_0.1.0_aarch64.dmg` et la fenêtre About
      # affiche 0.1.0 quel que soit le tag. On patche les 3 fichiers en
      # CI uniquement (pas commité), avant le bundle.
      - name: Inject version from tag
        shell: bash
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag = $GITHUB_REF_NAME -> version = $VERSION"
          node -e "
            const fs = require('fs');
            const v = process.argv[1];
            for (const f of ['package.json', 'src-tauri/tauri.conf.json']) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              j.version = v;
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
            }
            const cargoPath = 'src-tauri/Cargo.toml';
            const cargo = fs.readFileSync(cargoPath, 'utf8');
            fs.writeFileSync(
              cargoPath,
              cargo.replace(/^version = \"[^\"]+\"/m, 'version = \"' + v + '\"')
            );
          " "$VERSION"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: claude-kanban ${{ github.ref_name }}
          releaseBody: |
            Unsigned automatic build.

            ## Downloads

            - **macOS Apple Silicon (M1+)**: `.dmg` aarch64
            - **Windows**: `.msi` x64

            First launch (unsigned binary):
            - macOS: right-click the app → **Open** the first time to bypass Gatekeeper.
            - Windows: SmartScreen → **More info** → **Run anyway**.

            ## Runtime requirements

            **None.** The `claude` binary is shipped inside the app via the
            official `@anthropic-ai/claude-agent-sdk`, and Node is bundled by
            Tauri. On first launch, open **Settings → Claude account → Sign in**
            and follow the OAuth flow.
          releaseDraft: true
          prerelease: false
